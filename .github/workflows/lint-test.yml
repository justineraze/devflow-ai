name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-test:
    name: Lint + Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Ruff
        run: uv run ruff check .

      - name: Pytest
        id: pytest
        run: |
          output=$(uv run pytest -q --tb=short 2>&1)
          echo "$output"
          count=$(echo "$output" | grep -oP '^\d+(?= passed)' | tail -1)
          echo "count=${count:-0}" >> "$GITHUB_OUTPUT"

      - name: Update test count badge
        if: github.ref == 'refs/heads/main' && matrix.python-version == '3.12' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ vars.BADGE_GIST_ID }}
          filename: devflow-ai-tests.json
          label: tests
          message: ${{ steps.pytest.outputs.count }}
          color: green
